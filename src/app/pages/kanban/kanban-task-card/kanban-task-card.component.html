<div
  cdkDrag
  class="group cursor-grab rounded-lg border border-gray-200 bg-white p-4 shadow-sm transition-shadow hover:shadow-md dark:border-gray-700 dark:bg-gray-800"
  (click)="onCardClick()"
>
  <!-- Drag placeholder (reduced opacity) -->
  <div class="rounded-lg border-2 border-dashed border-gray-300 bg-gray-50 opacity-40 dark:border-gray-600 dark:bg-gray-700" *cdkDragPlaceholder></div>

  <!-- Task title -->
  <h4 class="mb-1 text-sm font-semibold text-gray-900 dark:text-white">
    {{ task.title }}
  </h4>

  <!-- Task description -->
  <p class="mb-3 text-xs text-gray-500 dark:text-gray-400" *ngIf="task.description">
    {{ task.description }}
  </p>

  <!-- Priority badge + reorder buttons -->
  <div class="flex items-center justify-between">
    <span
      class="inline-block rounded-full px-2 py-0.5 text-xs font-medium"
      [ngClass]="[
        getPriorityColors(task.priority).bg,
        getPriorityColors(task.priority).text,
        getPriorityColors(task.priority).darkBg,
        getPriorityColors(task.priority).darkText
      ]"
    >
      {{ task.priority }}
    </span>

    <div class="flex gap-1">
      <!-- Move up button -->
      <button
        type="button"
        class="rounded p-1 text-gray-400 hover:bg-gray-100 hover:text-gray-600 disabled:cursor-not-allowed disabled:opacity-30 dark:hover:bg-gray-700 dark:hover:text-gray-300"
        [disabled]="isFirst"
        [attr.aria-label]="'Move task ' + task.title + ' up'"
        (click)="onMoveUp($event)"
      >
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M5 15l7-7 7 7" />
        </svg>
      </button>

      <!-- Move down button -->
      <button
        type="button"
        class="rounded p-1 text-gray-400 hover:bg-gray-100 hover:text-gray-600 disabled:cursor-not-allowed disabled:opacity-30 dark:hover:bg-gray-700 dark:hover:text-gray-300"
        [disabled]="isLast"
        [attr.aria-label]="'Move task ' + task.title + ' down'"
        (click)="onMoveDown($event)"
      >
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
        </svg>
      </button>
    </div>
  </div>
</div>
